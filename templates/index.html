<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Skyzone</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f6f8);
            color: var(--tg-theme-text-color, #333);
            margin: 0; padding: 20px; text-align: center;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 15px; padding: 20px; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { margin: 0 0 5px 0; color: #01875f; }
        .stats-grid {
            display: flex; justify-content: space-between; margin-top: 20px;
        }
        .stat-box {
            background: #f8f9fa; padding: 15px; border-radius: 10px; width: 45%;
            border: 1px solid #e8eaed;
        }
        .stat-box h3 { margin: 0; font-size: 24px; color: #202124; }
        .stat-box p { margin: 5px 0 0 0; font-size: 12px; color: #5f6368; }
        .timer-box {
            margin-top: 25px; padding: 15px; border-radius: 10px;
            background-color: #fff0f0; border: 1px solid #ffcdd2;
        }
        .timer-text { font-size: 22px; font-weight: bold; color: #d32f2f; margin: 10px 0; }
        .close-btn {
            background-color: #01875f; color: white; border: none;
            padding: 12px 30px; border-radius: 25px; font-weight: bold;
            margin-top: 30px; cursor: pointer; width: 100%; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="userName">Loading...</h2>
        <p style="margin:0; font-size: 13px; color: #666;">Welcome to your Dashboard</p>

        <div class="stats-grid">
            <div class="stat-box">
                <h3 id="ltSearches">0</h3>
                <p>Total Searches</p>
            </div>
            <div class="stat-box">
                <h3 id="ltLeads">0</h3>
                <p>Total Leads Found</p>
            </div>
        </div>

        <div class="timer-box">
            <div style="font-size: 13px; color: #d32f2f; font-weight: bold; text-transform: uppercase;">Subscription Time Left</div>
            <div class="timer-text" id="countdown">Calculating...</div>
        </div>
    </div>

    <button class="close-btn" onclick="Telegram.WebApp.close()">Close Dashboard</button>

    <script>
        // Initialize Telegram Web App
        window.Telegram.WebApp.expand();

        // Get URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('userName').innerText = urlParams.get('name') || 'User';
        document.getElementById('ltSearches').innerText = urlParams.get('searches') || '0';
        document.getElementById('ltLeads').innerText = urlParams.get('leads') || '0';

        // Countdown Logic
        const endsAtStr = urlParams.get('ends');
        if (endsAtStr) {
            const endsAt = new Date(endsAtStr).getTime();
            
            setInterval(function() {
                const now = new Date().getTime();
                const distance = endsAt - now;

                if (distance < 0) {
                    document.getElementById('countdown').innerText = "EXPIRED";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('countdown').innerText = 
                    days + "d " + hours + "h " + minutes + "m " + seconds + "s";
            }, 1000);
        } else {
            document.getElementById('countdown').innerText = "Lifetime / Admin";
        }
    </script>
</body>
</html>
